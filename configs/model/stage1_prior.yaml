model:
  stage1_prior:
    encoder:
      name: dinov2
      freeze: true
      variant: vitb14
    geometry_projection:
      enabled: true
      backend: nvdiffrast
      fallback: pytorch3d
    uv:
      resolution: 256
      fusion: confidence_weighted_average
      refinement: true
    outputs:
      uv_position_map: true
      uv_normal_map: true
      refined_mesh: true
