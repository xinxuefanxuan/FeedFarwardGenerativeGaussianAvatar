model:
  stage2_gaussian:
    train_separately_from_stage1: true
    anchor_init:
      source: refined_mesh_or_uv
      type: surface_gaussian_only
      num_anchors: 20000
    decoder:
      hidden_dim: 256
      prompt_conditioned: false
    renderer:
      backend: gsplat
    metrics:
      - psnr
      - ssim
      - lpips
    disabled_features:
      diffusion: true
      vggt_family: true
      hair: true
      relighting: true
      residual_off_surface: true
